<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hakaru - Landing Page</title>
  <style>
    /* CSS Reset & Variáveis */
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      
      --indigo-50: #eef2ff;
      --indigo-100: #e0e7ff;
      --indigo-200: #c7d2fe;
      --indigo-700: #4338ca;
      
      --white: #ffffff;
      
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--white);
      color: var(--slate-900);
      line-height: 1.5;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    svg {
      display: block;
    }

    /* Layout & Utilities */
    .max-w-4xl { max-width: 56rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .w-full { width: 100%; }
    .pt-8 { padding-top: 2rem; }
    .pb-16 { padding-bottom: 4rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mb-8 { margin-bottom: 2rem; }
    .mb-12 { margin-bottom: 3rem; }
    .mt-auto { margin-top: auto; }
    
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .gap-1-5 { gap: 0.375rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-6 { gap: 1.5rem; }
    .space-x-4 > * + * { margin-left: 1rem; }
    .flex-1 { flex: 1 1 0%; }

    .grid { display: grid; }
    
    @media (min-width: 768px) {
      .md-grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* Typography */
    .text-center { text-align: center; }
    .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .text-xs { font-size: 0.75rem; line-height: 1rem; }
    .text-10px { font-size: 10px; line-height: 1; }
    
    .font-black { font-weight: 900; }
    .font-bold { font-weight: 700; }
    .font-medium { font-weight: 500; }
    .font-mono { font-family: var(--font-mono); }
    
    .tracking-tight { letter-spacing: -0.025em; }
    .tracking-wider { letter-spacing: 0.05em; }
    .tracking-widest { letter-spacing: 0.1em; }
    .uppercase { text-transform: uppercase; }

    /* Colors */
    .text-slate-900 { color: var(--slate-900); }
    .text-slate-700 { color: var(--slate-700); }
    .text-slate-600 { color: var(--slate-600); }
    .text-slate-500 { color: var(--slate-500); }
    .text-slate-400 { color: var(--slate-400); }
    .text-white { color: var(--white); }
    
    .bg-white { background-color: var(--white); }
    .bg-slate-50 { background-color: var(--slate-50); }
    .bg-slate-900 { background-color: var(--slate-900); }
    .bg-indigo-50 { background-color: var(--indigo-50); }
    .text-indigo-700 { color: var(--indigo-700); }

    /* Borders & Shadows */
    .border { border-width: 1px; border-style: solid; }
    .border-slate-100 { border-color: var(--slate-100); }
    .border-slate-200 { border-color: var(--slate-200); }
    .border-indigo-200 { border-color: var(--indigo-200); }
    
    .rounded { border-radius: 0.25rem; }
    .rounded-xl { border-radius: 0.75rem; }
    
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .hover-shadow-md:hover { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
    
    /* Padding */
    .p-6 { padding: 1.5rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-2-5 { padding-top: 0.625rem; padding-bottom: 0.625rem; }
    
    /* Interactive */
    .transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .transition-shadow { transition-property: box-shadow; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    
    .hover-bg-indigo-100:hover { background-color: var(--indigo-100); }
    .hover-bg-slate-800:hover { background-color: var(--slate-800); }
    .hover-bg-slate-50:hover { background-color: var(--slate-50); }
    
    .w-4 { width: 1rem; }
    .h-4 { height: 1rem; }
    .fill-current { fill: currentColor; }
  </style>
</head>
<body>

  <div class="max-w-4xl mx-auto w-full pt-8 pb-16 px-4">
    <header class="mb-12 flex flex-col items-center text-center">
      <h1 class="text-3xl font-black tracking-tight text-slate-900 mb-2">Hakaru</h1>
      <p class="text-slate-500 font-medium mb-6">Controle de metas e ciclo de estudos diário</p>
      <button 
        id="btn-history"
        class="flex items-center gap-2 bg-indigo-50 text-indigo-700 hover-bg-indigo-100 px-4 py-2 rounded text-xs font-bold uppercase tracking-wider transition-colors border border-indigo-200"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        Ver Histórico de Estudos
      </button>
    </header>

    <div id="sessions-container" class="grid gap-6 md-grid-cols-2">
      <!-- Os cartões de sessão serão injetados via JavaScript puro aqui -->
    </div>
  </div>

  <script>
    // ETAPA 3: TRADUÇÃO COMPORTAMENTAL (LÓGICA EM VANILLA JS)
    
    // Mock Data idêntica ao original em TypeScript (sem as tipagens TS)
    const sessions = [
      {
        id: "1",
        title: "Sessão Diurna",
        timeRange: "08:00 - 12:00",
        days: "Segunda a Sexta",
        tasks: [
          { id: "t1", durationMinutes: 15 },
          { id: "t2", durationMinutes: 15 },
          { id: "t3", durationMinutes: 12 },
          { id: "t4", durationMinutes: 12 },
          { id: "t5", durationMinutes: 5 },
          { id: "t6", durationMinutes: 30 },
          { id: "t7", durationMinutes: 10 },
          { id: "t8", durationMinutes: 11 }
        ]
      }
    ];

    // Funções de formatação equivalentes ao utils/formatters.ts
    function getTotalDuration(tasks) {
      return tasks.reduce((acc, task) => acc + task.durationMinutes, 0);
    }

    // Inicialização da View (DOM Manipulation)
    document.addEventListener("DOMContentLoaded", () => {
      
      const container = document.getElementById("sessions-container");
      
      // Renderiza as sessões
      sessions.forEach(session => {
        const totalMinutes = getTotalDuration(session.tasks);
        const hours = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;
        const durationStr = hours > 0 ? `${hours}h ${mins > 0 ? mins + 'm' : ''}` : `${mins}m`;

        const card = document.createElement("div");
        card.className = "bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col hover-shadow-md transition-shadow";
        
        card.innerHTML = `
          <div class="flex justify-between items-start mb-6">
            <div>
              <h2 class="text-sm font-black uppercase tracking-widest text-slate-900 mb-1">${session.title}</h2>
              <div class="flex items-center text-xs text-slate-500 font-bold space-x-4">
                <span class="flex items-center gap-1-5">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  ${session.timeRange || '--:--'}
                </span>
                <span>${session.days || 'Todos os dias'}</span>
              </div>
            </div>
          </div>

          <div class="mb-8">
            <div class="text-10px uppercase font-bold text-slate-400 mb-2">Resumo:</div>
            <div class="flex items-center justify-between text-slate-700 font-mono text-xs bg-slate-50 px-3 py-2 rounded border border-slate-100">
              <span class="font-bold">${session.tasks.length} etapas</span>
              <span class="font-bold">${durationStr} total</span>
            </div>
          </div>

          <div class="mt-auto flex gap-3">
            <button
              class="btn-start flex-1 bg-slate-900 hover-bg-slate-800 text-white text-xs font-bold py-2-5 px-4 rounded uppercase tracking-wider flex items-center justify-center gap-2 transition-colors shadow-sm"
              data-id="${session.id}"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 fill-current"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              Iniciar Sessão
            </button>
            <button
              class="btn-edit px-4 py-2-5 rounded border border-slate-200 text-slate-600 hover-bg-slate-50 transition-colors flex items-center justify-center shadow-sm"
              aria-label="Editar"
              data-id="${session.id}"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
            </button>
          </div>
        `;
        
        container.appendChild(card);
      });

      // Vinculação de Eventos Interativos (Vanilla JS)
      document.getElementById('btn-history').addEventListener('click', () => {
        alert('Navegação para Histórico (Interceptado via JS puro)');
      });

      document.querySelectorAll('.btn-start').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          alert(`Iniciando sessão: ${id}`);
        });
      });

      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          alert(`Editando sessão: ${id}`);
        });
      });
    });
  </script>
</body>
</html>
